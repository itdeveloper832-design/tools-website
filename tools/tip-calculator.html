<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tip Calculator - Calculate Tips and Split Bills Free 2024</title>
  <meta name="description" content="Calculate tips and split bills easily. Free tip calculator with percentage options. Perfect for restaurants.">
  <meta name="keywords" content="tip calculator, calculate tip, gratuity calculator, bill splitter">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/professional.css">
  <script src="../js/components.js"></script>
</head>
<body class="bg-gray-50 text-gray-800">
  <div data-component="../components/header.html"></div>

  <section class="tool-header">
    <div class="container">
      <div class="tool-header-content">
        <div class="tool-breadcrumb">
          <a href="/" class="breadcrumb-link">
            <svg class="breadcrumb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
            </svg>
            Home
          </a>
          <svg class="breadcrumb-separator" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
          </svg>
          <a href="/tools" class="breadcrumb-link">Tools</a>
          <svg class="breadcrumb-separator" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
          </svg>
          <span class="breadcrumb-current">Tip Calculator</span>
        </div>
        
        <div class="tool-info">
          <div class="tool-icon-wrapper">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
          </div>
          <div class="tool-details">
            <h1 class="tool-title">Tip Calculator</h1>
            <p class="tool-description">Calculate tips and split bills easily with customizable tip percentages.</p>
            <div class="tool-meta">
              <span class="tool-category">Calculator Tools</span>
              <span class="tool-status">Professional Tool</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section class="tool-content">
    <div class="container">
      <div class="tool-layout">
        <div class="tool-main">
          <div class="tool-card">
            <div class="tool-card-header">
              <h2 class="tool-card-title">Calculate Tip</h2>
              <div class="tool-actions">
                <button id="calculate-btn" class="btn btn-primary">Calculate</button>
                <button id="clear-btn" class="btn btn-outline">Clear</button>
              </div>
            </div>
            
            <div class="tool-card-body">
              <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Bill Amount ($)</label>
                <input type="number" id="bill" class="tool-input" placeholder="100" value="100">
              </div>

              <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Tip Percentage (%)</label>
                <input type="number" id="tip-percent" class="tool-input" placeholder="15" value="15">
              </div>

              <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Number of People</label>
                <input type="number" id="people" class="tool-input" placeholder="1" value="1" min="1">
              </div>

              <div id="result" class="tool-output min-h-[200px]">
                <p class="text-gray-600 text-center">Enter values and click Calculate</p>
              </div>
            </div>
          </div>
        </div>

        <div class="tool-sidebar">
          <div class="sidebar-card">
            <div class="sidebar-card-header">
              <h3 class="sidebar-card-title">
                <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                Quick Tips
              </h3>
            </div>
            <div class="sidebar-card-body">
              <div class="space-y-2 text-sm">
                <button onclick="document.getElementById('tip-percent').value=10;document.getElementById('calculate-btn').click()" class="w-full p-2 bg-gray-100 rounded hover:bg-gray-200">10% Tip</button>
                <button onclick="document.getElementById('tip-percent').value=15;document.getElementById('calculate-btn').click()" class="w-full p-2 bg-gray-100 rounded hover:bg-gray-200">15% Tip</button>
                <button onclick="document.getElementById('tip-percent').value=18;document.getElementById('calculate-btn').click()" class="w-full p-2 bg-gray-100 rounded hover:bg-gray-200">18% Tip</button>
                <button onclick="document.getElementById('tip-percent').value=20;document.getElementById('calculate-btn').click()" class="w-full p-2 bg-gray-100 rounded hover:bg-gray-200">20% Tip</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div data-component="../components/footer.html"></div>

  <script>
    const calculateBtn = document.getElementById('calculate-btn');
    const clearBtn = document.getElementById('clear-btn');
    const billInput = document.getElementById('bill');
    const tipPercentInput = document.getElementById('tip-percent');
    const peopleInput = document.getElementById('people');
    const resultDiv = document.getElementById('result');

    calculateBtn.addEventListener('click', calculate);
    clearBtn.addEventListener('click', clear);

    function calculate() {
      const bill = parseFloat(billInput.value);
      const tipPercent = parseFloat(tipPercentInput.value);
      const people = parseInt(peopleInput.value) || 1;

      if (isNaN(bill) || isNaN(tipPercent)) {
        alert('Please enter valid numbers');
        return;
      }

      const tipAmount = (bill * tipPercent) / 100;
      const total = bill + tipAmount;
      const perPerson = total / people;
      const tipPerPerson = tipAmount / people;

      resultDiv.innerHTML = `
        <div style="padding:20px">
          <div style="text-align:center;margin-bottom:25px">
            <div style="font-size:48px;font-weight:bold;color:#2563eb">$${total.toFixed(2)}</div>
            <p style="color:#666;margin-top:8px">Total Amount</p>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:20px">
            <div style="padding:15px;background:#f0f9ff;border-radius:8px;text-align:center">
              <div style="font-size:24px;font-weight:bold;color:#0369a1">$${tipAmount.toFixed(2)}</div>
              <p style="color:#666;font-size:14px;margin-top:5px">Tip Amount</p>
            </div>
            <div style="padding:15px;background:#f0f9ff;border-radius:8px;text-align:center">
              <div style="font-size:24px;font-weight:bold;color:#0369a1">$${bill.toFixed(2)}</div>
              <p style="color:#666;font-size:14px;margin-top:5px">Bill Amount</p>
            </div>
          </div>
          ${people > 1 ? `
          <div style="padding:20px;background:#ecfdf5;border-radius:8px;text-align:center">
            <div style="font-size:32px;font-weight:bold;color:#059669">$${perPerson.toFixed(2)}</div>
            <p style="color:#666;margin-top:5px">Per Person (${people} people)</p>
            <p style="color:#666;font-size:14px;margin-top:8px">Tip per person: $${tipPerPerson.toFixed(2)}</p>
          </div>
          ` : ''}
        </div>
      `;
    }

    function clear() {
      billInput.value = '';
      tipPercentInput.value = '';
      peopleInput.value = '1';
      resultDiv.innerHTML = '<p class="text-gray-600 text-center">Enter values and click Calculate</p>';
    }
  </script>
</body>
</html>
